<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>青空ペイント｜外壁・屋根塗装専門店</title>
<meta name="description" content="地域密着の自社職人による高品質な外壁・屋根塗装。無料見積もり受付中。" />
<!--
  ============================================================
  イメージマップ方式のデモページ（背面に1枚画像＋透明クリック領域）
  ・hp.png をそのまま背面に敷き、クリックさせたい所だけ透明 <a> を%で重ねる
  ・ナビ/ボタンを押すと該当セクションの「アンカー」へスムーススクロール
  ・座標は全て画像(941x1672)からの% → 画面幅が変わっても画像とぴったり伸縮
  ・末尾に ?edit を付けてアクセスするとクリック領域が青く可視化されます
    （位置調整したい時の確認用）
  ============================================================
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:#e9edf1;font-family:system-ui,sans-serif;}
  .map{position:relative;max-width:960px;margin:0 auto;background:#fff;box-shadow:0 10px 40px -18px rgba(0,0,0,.3);}
  .map>img{width:100%;display:block;}

  /* スクロール先アンカー（セクションの縦位置に%で配置） */
  .anchor{position:absolute;left:0;width:1px;height:1px;}

  /* 透明クリック領域 */
  .hot{position:absolute;display:block;border-radius:8px;transition:background .15s;}
  .hot:hover{background:rgba(0,130,255,.14);}
  .hot:focus-visible{outline:2px solid #0a7;}

  /* ?edit でクリック領域を可視化（調整確認用） */
  body.show-hot .hot{background:rgba(0,130,255,.22);outline:1px solid rgba(0,80,190,.6);}

  /* トップ（ナビ）へ戻る小ボタン */
  .totop{position:fixed;right:16px;bottom:16px;width:46px;height:46px;border-radius:50%;
    background:#1f5fd0;color:#fff;border:none;cursor:pointer;font-size:18px;line-height:46px;
    text-align:center;box-shadow:0 8px 20px -6px rgba(0,0,0,.5);opacity:0;pointer-events:none;
    transition:.25s;z-index:20;text-decoration:none;}
  .totop.show{opacity:1;pointer-events:auto;}
  .totop:hover{background:#1748a8;}
</style>
</head>
<body id="top">
  <div class="map">
    <img src="hp.png" alt="青空ペイント｜外壁・屋根塗装専門店" />

    <!-- ===== スクロール先アンカー ===== -->
    <span class="anchor" id="reasons" style="top:18.4%"></span>
    <span class="anchor" id="works"   style="top:38.4%"></span>
    <span class="anchor" id="price"   style="top:52.7%"></span>
    <span class="anchor" id="flow"    style="top:61.8%"></span>
    <span class="anchor" id="contact" style="top:83.7%"></span>
    <span class="anchor" id="company" style="top:92.8%"></span>

    <!-- ===== ナビゲーション（ジャンプ） ===== -->
    <a class="hot" href="#top"     style="left:32.4%;top:1.1%;width:5.3%;height:2.2%" aria-label="ホーム"></a>
    <a class="hot" href="#reasons" style="left:40.7%;top:1.1%;width:9.0%;height:2.2%" aria-label="選ばれる理由"></a>
    <a class="hot" href="#works"   style="left:53.1%;top:1.1%;width:7.2%;height:2.2%" aria-label="施工事例"></a>
    <a class="hot" href="#price"   style="left:64.1%;top:1.1%;width:6.9%;height:2.2%" aria-label="料金目安"></a>
    <a class="hot" href="#flow"    style="left:74.4%;top:1.1%;width:8.0%;height:2.2%" aria-label="施工の流れ"></a>
    <a class="hot" href="#company" style="left:85.0%;top:1.1%;width:6.7%;height:2.2%" aria-label="会社情報"></a>
    <a class="hot" href="#contact" style="left:92.2%;top:1.0%;width:5.8%;height:2.6%" aria-label="お問い合わせ"></a>

    <!-- ===== ヒーローのボタン ===== -->
    <a class="hot" href="#contact" style="left:4.3%;top:14.8%;width:20.0%;height:2.7%" aria-label="無料見積もりはこちら"></a>
    <a class="hot" href="#works"   style="left:26.3%;top:14.8%;width:15.5%;height:2.7%" aria-label="施工事例を見る"></a>

    <!-- ===== サービス紹介「詳しく見る」 ===== -->
    <a class="hot" href="#contact" style="left:7.4%;top:36.0%;width:8.5%;height:1.6%" aria-label="外壁塗装 詳しく見る"></a>
    <a class="hot" href="#contact" style="left:30.6%;top:36.0%;width:8.5%;height:1.6%" aria-label="屋根塗装 詳しく見る"></a>
    <a class="hot" href="#contact" style="left:54.0%;top:36.0%;width:8.5%;height:1.6%" aria-label="防水工事 詳しく見る"></a>
    <a class="hot" href="#contact" style="left:77.0%;top:36.0%;width:8.5%;height:1.6%" aria-label="付帯部塗装 詳しく見る"></a>

    <!-- ===== すべての施工事例を見る ===== -->
    <a class="hot" href="#works" style="left:15.9%;top:50.6%;width:25.3%;height:1.7%" aria-label="すべての施工事例を見る"></a>

    <!-- ===== 下部CTA：電話・問い合わせ ===== -->
    <a class="hot" href="tel:0120118724" style="left:9.4%;top:88.8%;width:24.1%;height:2.7%" aria-label="電話 0120-11-8724"></a>
    <a class="hot" href="mailto:info@example.com" style="left:59.0%;top:87.4%;width:33.5%;height:2.5%" aria-label="無料見積もり・お問い合わせはこちら"></a>
    <a class="hot" href="mailto:info@example.com" style="left:59.0%;top:90.1%;width:33.5%;height:2.4%" aria-label="メールでのお問い合わせ"></a>
  </div>

  <a href="#top" class="totop" id="totop" aria-label="トップへ戻る">▲</a>

  <script>
    // ?edit でクリック領域を可視化（位置調整の確認用）
    if (location.search.indexOf('edit') > -1) document.body.classList.add('show-hot');
    // 少しスクロールしたら「トップへ」ボタン表示（ナビへ戻れる）
    const totop = document.getElementById('totop');
    addEventListener('scroll', () => {
      totop.classList.toggle('show', scrollY > 600);
    }, { passive: true });
  </script>
</body>
</html>
