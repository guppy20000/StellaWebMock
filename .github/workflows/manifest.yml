name: Build mocks manifest

# mocks/ に変更があったら manifest.json を自動再生成してコミットする。
# （GITHUB_TOKEN による push は再度ワークフローを起動しないため無限ループしない）
on:
  push:
    branches: [main]
    paths:
      - 'mocks/**'
      - 'tools/build-manifest.mjs'

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate manifest
        run: node tools/build-manifest.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain mocks/manifest.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add mocks/manifest.json
            git commit -m "chore: update mocks manifest [skip ci]"
            git push
            echo "manifest updated"
          else
            echo "manifest unchanged"
          fi
